<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <defs>
    <filter id="s" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#CBD5E1"/>
    </marker>
  </defs>

  <rect width="500" height="300" fill="#F8FAFC"/>

  <!-- Box 1: Sign up — y=20, h=50, bottom=70 -->
  <rect x="50" y="20" width="400" height="50" rx="10" fill="white" stroke="#93C5FD" stroke-width="1.5" filter="url(#s)"/>
  <text font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" x="250" y="50" font-size="13" font-weight="600" fill="#1E293B">Sign up via Web Console</text>

  <line x1="250" y1="70" x2="250" y2="88" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Box 2: Copy pairing instructions — y=90, h=55, bottom=145 -->
  <rect x="50" y="90" width="400" height="55" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#s)"/>
  <text font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" x="250" y="113" font-size="13" font-weight="600" fill="#1E293B">Copy the pairing instructions for your agent</text>
  <text font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" x="250" y="133" font-size="11" fill="#64748B">View and adjust your policies while you're here</text>

  <line x1="250" y1="145" x2="250" y2="163" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Box 3: Agent sets up automatically — y=165, h=50, bottom=215 -->
  <rect x="50" y="165" width="400" height="50" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#s)"/>
  <text font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" x="250" y="195" font-size="13" font-weight="600" fill="#1E293B">Agent sets up automatically</text>

  <line x1="250" y1="215" x2="250" y2="233" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ag)"/>

  <!-- Box 4: Bind IM (optional) — y=235, h=50 -->
  <rect x="100" y="235" width="300" height="50" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" x="250" y="257" font-size="12" font-weight="600" fill="#64748B">Bind IM channel</text>
  <text font-family="system-ui,-apple-system,sans-serif" text-anchor="middle" x="250" y="273" font-size="10.5" fill="#94A3B8">Human App · optional</text>
</svg>
