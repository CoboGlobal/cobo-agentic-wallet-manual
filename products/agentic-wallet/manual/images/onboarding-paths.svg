<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arrA" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#93C5FD"/>
    </marker>
    <marker id="arrB" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#86EFAC"/>
    </marker>
    <marker id="arrC" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#C4B5FD"/>
    </marker>
    <marker id="arrW" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="14" fill="#F8FAFC"/>

  <!-- ─── SUPERVISED (left) ─── -->
  <rect x="16" y="16" width="270" height="38" rx="9" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="151" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">Supervised</text>

  <!-- S1 -->
  <rect x="16" y="66" width="270" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="38" cy="92" r="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="38" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#3B82F6">1</text>
  <text x="58" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Sign in to Cobo Agentic Wallet app</text>
  <text x="58" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Click Connect Agent → get pairing code</text>
  <line x1="151" y1="118" x2="151" y2="133" stroke="#93C5FD" stroke-width="1.4" marker-end="url(#arrA)"/>

  <!-- S2 -->
  <rect x="16" y="136" width="270" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="38" cy="162" r="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="38" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#3B82F6">2</text>
  <text x="58" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Run pairing instructions in agent</text>
  <text x="58" y="174" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#64748B">caw onboard --token &lt;CODE&gt; --create-wallet</text>
  <line x1="151" y1="188" x2="151" y2="203" stroke="#93C5FD" stroke-width="1.4" marker-end="url(#arrA)"/>

  <!-- S3 -->
  <rect x="16" y="206" width="270" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="38" cy="232" r="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="38" y="236" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#3B82F6">3</text>
  <text x="58" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Agent runs 5 steps (60–180s)</text>
  <text x="58" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Register · TSS node · Create wallet</text>
  <line x1="151" y1="258" x2="151" y2="273" stroke="#93C5FD" stroke-width="1.4" marker-end="url(#arrA)"/>

  <!-- S4 -->
  <rect x="16" y="276" width="270" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="38" cy="302" r="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="38" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#3B82F6">4</text>
  <text x="58" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Set policies in Cobo Agentic Wallet app</text>
  <text x="58" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Can do in parallel with step 2–3</text>

  <!-- ─── divider ─── -->
  <line x1="313" y1="16" x2="313" y2="370" stroke="#E2E8F0" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- ─── ON-DEVICE (center) ─── -->
  <rect x="328" y="16" width="245" height="38" rx="9" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#15803D">On-device</text>

  <!-- O1 -->
  <rect x="328" y="66" width="245" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="350" cy="92" r="11" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="350" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#22C55E">1</text>
  <text x="370" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Create wallet in Cobo Agentic Wallet app</text>
  <text x="370" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Key shares stay on your phone</text>
  <line x1="450" y1="118" x2="450" y2="133" stroke="#86EFAC" stroke-width="1.4" marker-end="url(#arrB)"/>

  <!-- O2 -->
  <rect x="328" y="136" width="245" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="350" cy="162" r="11" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="350" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#22C55E">2</text>
  <text x="370" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Tap Connect Agent</text>
  <text x="370" y="174" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Get pairing code + instructions</text>
  <line x1="450" y1="188" x2="450" y2="203" stroke="#86EFAC" stroke-width="1.4" marker-end="url(#arrB)"/>

  <!-- O3 -->
  <rect x="328" y="206" width="245" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="350" cy="232" r="11" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="350" y="236" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#22C55E">3</text>
  <text x="370" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Run instruction in agent</text>
  <text x="370" y="244" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#64748B">caw onboard --token &lt;CODE&gt;</text>
  <line x1="450" y1="258" x2="450" y2="273" stroke="#86EFAC" stroke-width="1.4" marker-end="url(#arrB)"/>

  <!-- O4 -->
  <rect x="328" y="276" width="245" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="350" cy="302" r="11" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.2"/>
  <text x="350" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#22C55E">4</text>
  <text x="370" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Delegate wallet in Cobo Agentic Wallet app</text>
  <text x="370" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Authorize agent via chat assistant</text>

  <!-- ─── divider ─── -->
  <line x1="600" y1="16" x2="600" y2="370" stroke="#E2E8F0" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- ─── AUTONOMOUS (right) ─── -->
  <rect x="616" y="16" width="268" height="38" rx="9" fill="#FAF5FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="750" y="40" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7C3AED">Autonomous</text>

  <!-- A1 -->
  <rect x="616" y="66" width="268" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="638" cy="92" r="11" fill="#FAF5FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="638" y="96" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#7C3AED">1</text>
  <text x="658" y="88" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">No pairing code needed</text>
  <text x="658" y="104" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Agent onboards itself</text>
  <line x1="750" y1="118" x2="750" y2="133" stroke="#C4B5FD" stroke-width="1.4" marker-end="url(#arrC)"/>

  <!-- A2 -->
  <rect x="616" y="136" width="268" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="638" cy="162" r="11" fill="#FAF5FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="638" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#7C3AED">2</text>
  <text x="658" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Run onboard command</text>
  <text x="658" y="174" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#64748B">caw onboard --create-wallet</text>
  <line x1="750" y1="188" x2="750" y2="203" stroke="#C4B5FD" stroke-width="1.4" marker-end="url(#arrC)"/>

  <!-- A3 -->
  <rect x="616" y="206" width="268" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="638" cy="232" r="11" fill="#FAF5FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="638" y="236" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#7C3AED">3</text>
  <text x="658" y="228" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Agent runs 5 steps (60–180s)</text>
  <text x="658" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Register · TSS node · Create wallet</text>
  <line x1="750" y1="258" x2="750" y2="273" stroke="#C4B5FD" stroke-width="1.4" marker-end="url(#arrC)"/>

  <!-- A4 -->
  <rect x="616" y="276" width="268" height="52" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#sh)"/>
  <circle cx="638" cy="302" r="11" fill="#FAF5FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="638" y="306" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#7C3AED">4</text>
  <text x="658" y="298" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Pair wallet (optional)</text>
  <text x="658" y="314" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#64748B">Run caw pair to transfer ownership</text>

  <!-- ─── CONVERGENCE ─── -->
  <line x1="151" y1="370" x2="151" y2="390" stroke="#94A3B8" stroke-width="1.3"/>
  <line x1="450" y1="370" x2="450" y2="390" stroke="#94A3B8" stroke-width="1.3"/>
  <line x1="750" y1="370" x2="750" y2="390" stroke="#94A3B8" stroke-width="1.3"/>
  <line x1="151" y1="390" x2="750" y2="390" stroke="#94A3B8" stroke-width="1.3"/>
  <line x1="450" y1="390" x2="450" y2="402" stroke="#94A3B8" stroke-width="1.3" marker-end="url(#arrW)"/>

  <!-- Wallet ready -->
  <rect x="240" y="402" width="420" height="14" rx="7" fill="#1E293B" stroke="#A78BFA" stroke-width="1"/>
  <text x="450" y="413" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#4ADE80">Wallet active</text>
</svg>
