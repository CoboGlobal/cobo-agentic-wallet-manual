<svg width="800" height="260" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#CBD5E1" flood-opacity="0.4"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" fill="#F8FAFC" rx="12"/>

  <!-- ===== LEFT: Your agent ===== -->
  <text x="112" y="22" text-anchor="middle" font-size="11" fill="#64748B">Your agent</text>
  <rect x="20" y="32" width="180" height="192" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="58" text-anchor="middle" font-size="13" font-weight="600" fill="#5B21B6">Your agent</text>
  <line x1="32" y1="66" x2="188" y2="66" stroke="#DDD6FE" stroke-width="1"/>
  <text x="110" y="85" text-anchor="middle" font-size="11" fill="#7C3AED">Your AI logic</text>
  <text x="110" y="103" text-anchor="middle" font-size="11" fill="#7C3AED">SDK or API calls</text>
  <text x="110" y="121" text-anchor="middle" font-size="11" fill="#7C3AED">Submits transactions</text>
  <text x="110" y="139" text-anchor="middle" font-size="11" fill="#7C3AED">Reads balances</text>
  <text x="110" y="157" text-anchor="middle" font-size="11" fill="#7C3AED">Handles denials</text>

  <!-- Arrows: Agent ↔ Center -->
  <line x1="200" y1="120" x2="254" y2="120" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="254" y1="134" x2="200" y2="134" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
  <text x="227" y="113" text-anchor="middle" font-size="9.5" fill="#94A3B8">API / SDK</text>
  <text x="227" y="149" text-anchor="middle" font-size="9.5" fill="#94A3B8">Results</text>

  <!-- ===== CENTER: Cobo Agentic Wallet ===== -->
  <rect x="258" y="24" width="268" height="214" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="392" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">Cobo Agentic Wallet</text>

  <!-- Wallet sub-box -->
  <rect x="274" y="59" width="236" height="44" rx="7" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="392" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#1D4ED8">Wallet &amp; assets</text>
  <text x="392" y="95" text-anchor="middle" font-size="10" fill="#3B82F6">Multi-chain · MPC-secured keys</text>

  <!-- Policies sub-box -->
  <rect x="274" y="111" width="236" height="44" rx="7" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="392" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#C2410C">Policies &amp; limits</text>
  <text x="392" y="147" text-anchor="middle" font-size="10" fill="#EA580C">Enforced on every transaction</text>

  <!-- Approvals sub-box -->
  <rect x="274" y="163" width="236" height="44" rx="7" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="392" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Approval workflows</text>
  <text x="392" y="199" text-anchor="middle" font-size="10" fill="#B45309">Pause &amp; wait for your go-ahead</text>

  <!-- Audit sub-box -->
  <rect x="274" y="215" width="236" height="17" rx="7" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="392" y="228" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">Audit trail · every action logged</text>

  <!-- ===== RIGHT: Owner tools ===== -->
  <text x="682" y="22" text-anchor="middle" font-size="11" fill="#64748B">You (wallet owner)</text>

  <!-- Cobo Agentic Wallet app -->
  <rect x="588" y="32" width="190" height="74" rx="10" fill="white" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="683" y="57" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">Cobo Agentic Wallet app</text>
  <text x="683" y="75" text-anchor="middle" font-size="10" fill="#64748B">Onboard · configure · approve</text>
  <text x="683" y="91" text-anchor="middle" font-size="10" fill="#64748B">Any browser, no code</text>

  <!-- Cobo Agentic Wallet app -->
  <rect x="588" y="142" width="190" height="74" rx="10" fill="white" stroke="#86EFAC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="683" y="167" text-anchor="middle" font-size="13" font-weight="600" fill="#15803D">Cobo Agentic Wallet app</text>
  <text x="683" y="185" text-anchor="middle" font-size="10" fill="#64748B">Mobile · keys on your device</text>
  <text x="683" y="201" text-anchor="middle" font-size="10" fill="#64748B">Sign &amp; approve from phone</text>

  <!-- Arrows: Center ↔ Cobo Agentic Wallet app -->
  <line x1="526" y1="71" x2="586" y2="71" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="586" y1="83" x2="526" y2="83" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>

  <!-- Arrows: Center ↔ Cobo Agentic Wallet app -->
  <line x1="526" y1="178" x2="586" y2="178" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="586" y1="190" x2="526" y2="190" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>
</svg>
