name: Sync Docs from cobo-agent-wallet

# Requires a self-hosted runner on the same machine as the source repo.
# To register one: https://github.com/rcsh1/cobo-agentic-wallet-manual/settings/actions/runners/new
#
# Required secret:
#   GH_PAT — GitHub PAT with `repo` scope, for opening PRs in CoboGlobal/cobo-agentic-wallet-manual

on:
  workflow_dispatch:
  schedule:
    # Run daily at 02:17 UTC
    - cron: '17 2 * * *'

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout manual repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync content from local mintlify source
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.DS_Store' \
            --exclude='scripts/' \
            --exclude='.github/' \
            "$HOME/Documents/github/cobo-agent-wallets/cobo-agent-wallet/mintlify/" ./

      - name: Create PR if changes exist
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to sync."
            exit 0
          fi

          SOURCE_COMMIT="$(git -C "$HOME/Documents/github/cobo-agent-wallets/cobo-agent-wallet" rev-parse --short HEAD 2>/dev/null || echo 'unknown')"
          BRANCH="sync/docs-$(date +%Y%m%d-%H%M%S)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "sync: update docs from cobo-agent-wallet mintlify

Source: cobo-agent-wallets@${SOURCE_COMMIT}"

          git push origin "$BRANCH"

          gh pr create \
            --repo CoboGlobal/cobo-agentic-wallet-manual \
            --title "sync: update docs from cobo-agent-wallet mintlify" \
            --body "$(cat <<EOF
Automated sync from \`cobo-agent-wallet/mintlify\`.

**Source commit:** \`${SOURCE_COMMIT}\`

---
_Created by GitHub Actions_
EOF
)" \
            --base master \
            --head "rcsh1:${BRANCH}"
